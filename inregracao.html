<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>integração</title>
    <style>
        .container {
            width: 400px;
            margin: 40px;
            background-color:antiquewhite;
            padding: 20px;
            border-radius: 10px;
        }

        h2 {
            text-align: center;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }

        .radio-grupo {
            margin-top: 5px;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            background-color: rgb(163, 128, 85);
            color: black;
            border: none;
            cursor: pointer;
        }

        #resultado {
            margin-top: 20px;
            padding: 10px;
            background-color: rgb(229, 213, 192);
            border-radius: 5px;
        }

        .erro {
            color: red;
        }

        .sucesso {
            color: green;
        }

        

    </style>
</head>
<body>
    <div>
        <div class="container">  
            <h2>Atendimento</h2> 

            <form id="formulario">
                <label> nome: </label>
                <input type="text" id="nome"

                <label> idade: </label>
                <input type="number" id="idade"

                <label> Tipo de atendimento: </label>
                <select id="tipo">
                    <option value="Tecnico">Técnico</option>
                    <option value="Administrativo"> Administrativo</option>
                    <option value="Suporte"> Suporte</option>
                </select>

                <label>Prioridade:</label>
                <div class="radio-grupo">
                    <input type="radio" name="prioridade" value="Baixa"> Baixa
                    <input type="radio" name="prioridade" value="Media"> Media
                    <input type="radio" name="prioridade" value="Alta"> Alta
                </div>

                <button type="submit">Enviar</button>
            </form>

            <div id="resultado"></div>

       </div>

       <script>
            document.getElementById("formulario").addEventListener("submit",function(event){
                event.preventDefault();

                let nome = document.getElementById("nome").value;
                let idade = document.getElementById("idade").value;
                let tipo = document.getElementById("tipo").value;

                let prioridadeSelecionada = document.querySelector('input[name="prioridade"]:checked');
                let prioridade = prioridadeSelecionada ? prioridadeSelecionada.value : "";

                let resultado = document.getElementById("resultado");

                if(nome === ""){
                    resultado.innerHTML = "<p class='erro'> O nome é obrigatório!</p>"
                    return;
                }

                if(idade === "" || idade < 0){
                    resultado.innerHTML = "<p class='erro'> A idade está inválida</p>"
                    return();
                }

                let mensagem = ""
                if(prioridade === "Alta"){
                    mensagem += "Atendimento urgente!"<br>

                }

                if(tipo === "tecnico"){
                    mensagem += "Encaminhar para equipe técnica.<br>"
                }

                if(idade < 18) {
                    mensagem += "Necessário responsável!<br>"
                }

                resultado.innerHTML = `
                    <p class="sucesso"><strong>Resumo do atendimento:</strong></p>
                    nome: ${nome}<br>
                    idade: ${idade}<br>
                    tipo: ${tipo}<br>
                    prioridade: ${prioridade}<br><br>
                    ${mensagem}
                `;

            });
       </script>
</body>
</html>
